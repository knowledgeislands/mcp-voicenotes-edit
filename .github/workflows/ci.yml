name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint:check
      - run: bun run lint:types
      - run: bun run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14
      # Smoke test: boots the built server and verifies the wire-level tool surface
      # matches the in-process registration. Runs after test:coverage so
      # unit-test failures surface first; test:smoke builds dist/ inline.
      - run: bun run test:smoke
